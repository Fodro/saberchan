name: Tag on merge

on:
  pull_request_target:
    types: [closed]
    branches: [main]

jobs:
  tag:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels) }}
        run: |
          git config user.name "saberchan-runner"
          git config user.email "saberchan-runner@users.noreply.github.com"

          LAST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)

          if echo "$LABELS" | jq -e 'any(.name == "major")' > /dev/null 2>&1; then
            IS_MAJOR=true
          else
            IS_MAJOR=false
          fi
          if echo "$LABELS" | jq -e 'any(.name == "patch")' > /dev/null 2>&1; then
            IS_PATCH=true
          else
            IS_PATCH=false
          fi

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            VERSION="${LAST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            if [ "$IS_MAJOR" = true ]; then
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
            elif [ "$IS_PATCH" = true ]; then
              PATCH=$((PATCH + 1))
            else
              MINOR=$((MINOR + 1))
              PATCH=0
            fi

            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$NEW_TAG" --generate-notes --verify-tag
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:${{ env.NEW_TAG }}
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:${{ env.NEW_TAG }}
