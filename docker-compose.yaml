# Production app compose: frontend + backend only.
# Data plane (Postgres, Redis, S3) and Keycloak/OIDC stay external.
#
#   cp .env.prod.dist .env.prod   # edit secrets / hosts
#   make prod-up
#
# TLS: put Caddy/nginx on the host (or `docker compose --profile proxy up`)
# terminating HTTPS → frontend:3000. Do NOT publish backend:8888 to the internet.

services:
  frontend:
    build:
      context: frontend
      dockerfile: ../frontend.Dockerfile
      args:
        MAIN_BACKEND_URL: http://backend:8888
        OIDC_REALM: ${OIDC_REALM}
        OIDC_REALM_INTERNAL: ${OIDC_REALM_INTERNAL}
        OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
        OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
        AUTH_HOST: ${AUTH_HOST}
        AUTH_SECRET: ${AUTH_SECRET}
        ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
        OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI}
        OIDC_LOGOUT_REDIRECT_URI: ${OIDC_LOGOUT_REDIRECT_URI}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      ORIGIN: ${ORIGIN:-${AUTH_HOST}}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-16M}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: backend
      dockerfile: ../backend.Dockerfile
    restart: unless-stopped
    # Intentionally NOT published — only reachable on the compose network
    # (frontend BFF → http://backend:8888). Exposing 8888 bypasses captcha.
    expose:
      - "8888"
    environment:
      DB_TYPE: ${DB_TYPE:-postgres}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      SSL_MODE: ${SSL_MODE:-require}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-25}
      DB_MIN_CONNS: ${DB_MIN_CONNS:-5}
      DB_MAX_CONN_LIFETIME: ${DB_MAX_CONN_LIFETIME:-30m}
      DB_MAX_CONN_IDLE_TIME: ${DB_MAX_CONN_IDLE_TIME:-5m}
      STORE_IP: ${STORE_IP:-true}
      PORT: ${PORT:-8888}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      PURGE_INTERVAL: ${PURGE_INTERVAL:-10m}
      REDIS_USER: ${REDIS_USER}
      REDIS_PASS: ${REDIS_PASS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_EXPIRES: ${REDIS_EXPIRES:-1m}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_URL: ${S3_URL}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_USE_SSL: ${S3_USE_SSL:-true}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8888/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Optional TLS terminator on the same host.
  #   docker compose --env-file .env.prod --profile proxy up -d
  caddy:
    profiles: ["proxy"]
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
